<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Rumana</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#07a8e8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#1e1e1e;
    padding:40px;
    border-radius:15px;
    width:350px;
    text-align:center;
}

h1{
    color:#08d9f1;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#07a8e8;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#edeff1;
}
</style>
</head>
<body>

<div class="login-box">
    <h1>Sign Up</h1>

    <input type="text" id="username" placeholder="Enter Username">

    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>
</div>

<script>
function login(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if(username !== "" && password !== ""){
        window.location.href = "index.html";
    }
    else{
        alert("Please enter username and password");
    }
}
</script>

</body>
</html>
